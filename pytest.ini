[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
timeout = 0

# ── Custom markers ────────────────────────────────────────────────────────────
# Mark tests that require a live Postgres/Redis as `integration`.
# Mark unusually slow tests (e.g. Playwright) as `slow`.
# CI runs all markers; local fast-pass uses: pytest -m "not integration and not slow"
markers =
    integration: requires live Postgres and/or Redis (deselect with -m "not integration")
    slow: test takes > 10 s or uses a real browser (deselect with -m "not slow")
