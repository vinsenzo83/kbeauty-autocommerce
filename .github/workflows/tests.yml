name: pytest

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: pytest (Python 3.11)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # ── Service containers ──────────────────────────────────────────────────────
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kbeauty
          POSTGRES_PASSWORD: kbeauty
          POSTGRES_DB: kbeauty_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kbeauty"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Environment variables ───────────────────────────────────────────────────
    env:
      APP_ENV: ci
      DEBUG: "false"
      LOG_LEVEL: WARNING

      # ── DB ────────────────────────────────────────────────────────────────────
      POSTGRES_USER: kbeauty
      POSTGRES_PASSWORD: kbeauty
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: kbeauty_test
      # Explicit override — app/config.py uses this when present, never touching prod.
      DATABASE_URL_TEST: "postgresql+asyncpg://kbeauty:kbeauty@localhost:5432/kbeauty_test"

      # ── Redis ─────────────────────────────────────────────────────────────────
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      REDIS_URL: "redis://localhost:6379/0"

      # ── Shopify (test stubs) ──────────────────────────────────────────────────
      SHOPIFY_WEBHOOK_SECRET: test_secret
      SHOPIFY_API_KEY: ""
      SHOPIFY_API_SECRET: ""
      SHOPIFY_STORE_DOMAIN: ""

      # ── Admin / JWT ───────────────────────────────────────────────────────────
      JWT_SECRET: ci-test-secret-32chars-padding!!
      ADMIN_EMAIL: admin@kbeauty.local
      ADMIN_PASSWORD: admin1234

      # ── Misc ─────────────────────────────────────────────────────────────────
      STORAGE_PATH: ./storage
      STYLEKOREAN_EMAIL: ""
      STYLEKOREAN_PASSWORD: ""
      STYLEKOREAN_BASE_URL: https://www.stylekorean.com
      PRODUCT_CRAWL_LIMIT: "500"

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup with pip cache ─────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Install Python dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install Playwright + browsers (needed by crawler/tracking tests) ────
      #       We install only Chromium and suppress errors so non-Playwright tests
      #       are not blocked if the install fails.
      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium --with-deps 2>/dev/null || true

      # ── 5. Create local storage dir ────────────────────────────────────────────
      - name: Create storage directory
        run: mkdir -p storage

      # ── 6. Wait for Postgres to be ready ───────────────────────────────────────
      - name: Wait for Postgres
        run: |
          until pg_isready -h localhost -U kbeauty -q; do
            echo "Waiting for postgres…"
            sleep 1
          done
          echo "Postgres is ready."

      # ── 7. Apply database migrations ───────────────────────────────────────────
      #   Files are applied in sort order (0001 → 0002 → …).
      #   Each file uses IF NOT EXISTS / DO-block guards so re-runs are safe.
      - name: Apply DB migrations
        env:
          PGPASSWORD: kbeauty
        run: |
          for f in $(ls migrations/*.sql | sort); do
            echo "Applying $f …"
            psql -h localhost -U kbeauty -d kbeauty_test -f "$f" \
              && echo "  ✓ $f" \
              || echo "  ⚠ $f returned non-zero (may be harmless — check output)"
          done

      # ── 8. Run the full pytest suite ───────────────────────────────────────────
      #   * -p no:timeout  – disable pytest-timeout inside the job; the
      #     outer `timeout-minutes: 20` on the job is the hard wall-clock limit.
      #   * --tb=short     – concise tracebacks on failure.
      #   * -q             – quiet mode (one dot per test).
      - name: Run pytest (full suite)
        run: pytest -q --tb=short -p no:timeout
