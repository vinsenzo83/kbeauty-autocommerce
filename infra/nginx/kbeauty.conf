# =============================================================================
# /etc/nginx/sites-available/kbeauty
#
# KBeauty AutoCommerce – Nginx Reverse Proxy
# VPS IP: 172.86.127.238
#
# Install:
#   sudo cp infra/nginx/kbeauty.conf /etc/nginx/sites-available/kbeauty
#   sudo ln -sf /etc/nginx/sites-available/kbeauty /etc/nginx/sites-enabled/kbeauty
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Routes:
#   /          → dashboard  (127.0.0.1:3001)
#   /admin/    → FastAPI    (127.0.0.1:8000)
#   /api/      → FastAPI    (127.0.0.1:8000)
#   /health    → FastAPI    (127.0.0.1:8000)
#   /webhook/  → FastAPI    (127.0.0.1:8000)
# =============================================================================

# ── Rate limiting zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:5m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=login_limit:1m    rate=5r/m;

# ── Upstream definitions ──────────────────────────────────────────────────────
upstream kbeauty_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream kbeauty_dashboard {
    server 127.0.0.1:3001;
    keepalive 16;
}

# =============================================================================
# HTTP → HTTPS redirect  (uncomment after SSL cert is installed)
# =============================================================================
# server {
#     listen 80;
#     server_name yourdomain.com www.yourdomain.com;
#     return 301 https://$host$request_uri;
# }

# =============================================================================
# Main server block (HTTP – active until SSL cert is obtained)
# Replace with the HTTPS block below once certbot is configured.
# =============================================================================
server {
    listen 80;
    server_name _;           # Catch-all; replace with domain when available

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/kbeauty_access.log;
    error_log   /var/log/nginx/kbeauty_error.log warn;

    # ── Client settings ───────────────────────────────────────────────────────
    client_max_body_size 20M;
    keepalive_timeout    65;

    # ── Health check (API) ────────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://kbeauty_api/health;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Shopify Webhooks ─────────────────────────────────────────────────────
    location /webhook/ {
        limit_req zone=webhook_limit burst=10 nodelay;

        proxy_pass         http://kbeauty_api/webhook/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Admin API (FastAPI /admin/*) ──────────────────────────────────────────
    location /admin/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://kbeauty_api/admin/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Block direct browser access without valid token
        # (actual auth enforced by FastAPI JWT middleware)
    }

    # ── REST API (FastAPI /api/*) ─────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;

        proxy_pass         http://kbeauty_api/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
    }

    # ── Admin login rate-limiting ─────────────────────────────────────────────
    location = /admin/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass         http://kbeauty_api/admin/auth/login;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Dashboard (Next.js – all other traffic) ───────────────────────────────
    location / {
        proxy_pass         http://kbeauty_dashboard/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_http_version 1.1;
        proxy_read_timeout 60s;

        # Next.js static assets: long-lived cache
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://kbeauty_dashboard;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Block hidden files (.git, .env, etc.) ────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}

