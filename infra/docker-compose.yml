version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kbeauty}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kbeauty}
      POSTGRES_DB: ${POSTGRES_DB:-kbeauty}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kbeauty}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host", "0.0.0.0",
        "--port", "8000",
        "--log-level", "info",
      ]

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      [
        "celery",
        "-A", "app.workers.celery_app:celery_app",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "-Q", "celery",
      ]

volumes:
  postgres_data:
